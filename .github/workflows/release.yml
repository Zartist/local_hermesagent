name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Moodle plugin ZIP
        run: |
          # Create a clean copy for the release
          mkdir -p /tmp/release
          rsync -a --exclude='.git/' --exclude='.github/' . /tmp/release/local_hermesagent/
          
          cd /tmp/release
          zip -r local_hermesagent.zip local_hermesagent/

      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from the tag (e.g. v0.4.0 → 0.4.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"

          # Get previous tag (skip the current tag at position 1)
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          echo "Previous tag: ${PREV_TAG:-none}"

          # Try to extract the matching section from CHANGES.md
          # Format: ## [0.4.0] — 2026-07-08
          if [ -f CHANGES.md ]; then
            # Extract from the version heading to the next --- separator
            SECTION=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found=1; next }
              found && /^---/ { exit }
              found { print }
            ' CHANGES.md | sed '/^$/N;/^\n$/D')

            if [ -n "$SECTION" ]; then
              {
                echo "## Changelog"
                echo ""
                echo "$SECTION"
                echo ""
              } > CHANGELOG_TMP.md
            fi
          fi

          # Append git log of commits since previous tag
          if [ -n "$PREV_TAG" ]; then
            echo "" >> CHANGELOG_TMP.md
            echo "### Commits since ${PREV_TAG}" >> CHANGELOG_TMP.md
            echo "" >> CHANGELOG_TMP.md
            git log "${PREV_TAG}..HEAD" --oneline --pretty=format:"- %s (%h)" >> CHANGELOG_TMP.md
          else
            echo "### Initial release" >> CHANGELOG_TMP.md
            echo "" >> CHANGELOG_TMP.md
            git log --oneline --pretty=format:"- %s (%h)" >> CHANGELOG_TMP.md
          fi

          echo "--- Generated changelog ---"
          cat CHANGELOG_TMP.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/release/local_hermesagent.zip
          body_path: CHANGELOG_TMP.md
          generate_release_notes: false
          draft: false
          prerelease: false
